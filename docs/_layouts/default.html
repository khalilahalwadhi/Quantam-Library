<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author.name }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">FAST-FPE</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/whitepaper' | relative_url }}">Whitepaper</a>
        <a href="{{ '/api' | relative_url }}">API Docs</a>
        <a href="{{ '/quantum-verification' | relative_url }}">Quantum Verified</a>
        <a href="https://github.com/khalilahalwadhi/Quantam-Library" class="nav-github">GitHub</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>FAST-FPE — Quantum-Safe Format-Preserving Encryption</p>
      <p class="footer-sub">By Khalilah Aisha al-Wadhi &middot; Based on the ASIACRYPT 2021 FAST algorithm &middot; MIT / Apache-2.0</p>
    </div>
  </footer>
</body>
</html>
